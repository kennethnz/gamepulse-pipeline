name: Deploy to Lambda and Glue

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::884135111160:role/gamepulse-github-role
          aws-region: ap-south-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests boto3 --target ./package
          cp src/ingestion/fetch.py ./package/

      - name: Zip package
        run: |
          cd package
          zip -r ../gamepulse_lambda.zip .

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name gamepulse-ingestion \
            --zip-file fileb://gamepulse_lambda.zip \
            --region ap-south-1

      - name: Upload Glue script to S3
        run: |
          aws s3 cp src/transform/clean.py \
            s3://gamepulse-datalake/scripts/clean.py